{% extends "base.html" %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Ad Soyad</label>
            <input type="text" name="name" class="form-control" required value="{{ user.name if user else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">E-posta</label>
            <input type="email" name="email" class="form-control" required value="{{ user.email if user else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Şifre {% if user %}<span class="text-muted small">(boş bırakılırsa değişmez)</span>{% endif %}</label>
            <input type="password" name="password" class="form-control" {% if not user %}required{% endif %}>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Rol</label>
            <select name="is_admin" class="form-select">
              <option value="0" {% if user and not user.is_admin %}selected{% endif %}>Kullanıcı</option>
              <option value="1" {% if user and user.is_admin %}selected{% endif %}>Admin</option>
            </select>
          </div>
          <div class="mb-3">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="is_approver" id="is_approver" value="1"
                     {% if user and user.is_approver %}checked{% endif %}>
              <label class="form-check-label fw-semibold" for="is_approver">Genel Müdür (HBF onay yetkilisi)</label>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Çalışan Profili Bağla</label>
            <select name="employee_id" class="form-select">
              <option value="">— Bağlı değil —</option>
              {% for emp in employees %}
              <option value="{{ emp.id }}"
                {% if user and user.linked_employee and user.linked_employee.id == emp.id %}selected{% endif %}>
                {{ emp.name }}{% if emp.title %} — {{ emp.title }}{% endif %}
              </option>
              {% endfor %}
            </select>
            <div class="form-text">Kullanıcı bu çalışan adına avans talebinde bulunabilir.</div>
          </div>
          {% if user %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Durum</label>
            <select name="active" class="form-select">
              <option value="1" {% if user.active %}selected{% endif %}>Aktif</option>
              <option value="0" {% if not user.active %}selected{% endif %}>Pasif</option>
            </select>
          </div>
          {% endif %}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">Kaydet</button>
            <a href="/users" class="btn btn-outline-secondary">İptal</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
