{% extends "base.html" %}
{% block page_title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Başlık</label>
            <input type="text" name="title" class="form-control" required value="{{ ref.title if ref else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Müşteri</label>
            <select name="customer_id" class="form-select">
              <option value="">— Seçiniz —</option>
              {% for c in customers %}
              <option value="{{ c.id }}" {% if ref and ref.customer_id == c.id %}selected{% endif %}>{{ c.name }} ({{ c.code }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="row g-3">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Etkinlik Tipi</label>
              <select name="event_type" class="form-select">
                {% for val, label in event_types %}
                <option value="{{ val }}" {% if ref and ref.event_type == val %}selected{% elif not ref and val == 'diger' %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label fw-semibold">Giriş Tarihi</label>
              <input type="date" name="check_in" class="form-control" value="{{ ref.check_in.isoformat() if ref and ref.check_in else '' }}">
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label fw-semibold">Çıkış Tarihi</label>
              <input type="date" name="check_out" class="form-control" value="{{ ref.check_out.isoformat() if ref and ref.check_out else '' }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Notlar</label>
            <textarea name="notes" class="form-control" rows="3">{{ ref.notes if ref else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Kaydet</button>
            <a href="/references{% if ref %}/{{ ref.id }}{% endif %}" class="btn btn-outline-secondary">İptal</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
