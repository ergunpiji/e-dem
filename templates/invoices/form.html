{% extends "base.html" %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Fatura Tipi</label>
              <select name="invoice_type" class="form-select" required>
                {% for val, label in invoice_types %}
                <option value="{{ val }}" {% if invoice and invoice.invoice_type == val %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Fatura Tarihi</label>
              <input type="date" name="invoice_date" class="form-control" required value="{{ invoice.invoice_date.isoformat() if invoice and invoice.invoice_date else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Fatura No</label>
              <input type="text" name="invoice_no" class="form-control" value="{{ invoice.invoice_no if invoice else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Para Birimi</label>
              <select name="currency" class="form-select">
                <option value="TRY" {% if not invoice or invoice.currency == 'TRY' %}selected{% endif %}>TRY</option>
                <option value="USD" {% if invoice and invoice.currency == 'USD' %}selected{% endif %}>USD</option>
                <option value="EUR" {% if invoice and invoice.currency == 'EUR' %}selected{% endif %}>EUR</option>
              </select>
            </div>
            <div class="col-md-7">
              <label class="form-label fw-semibold">Tutar (KDV hariç)</label>
              <input type="number" name="amount" step="0.01" class="form-control" required value="{{ invoice.amount if invoice else '' }}">
            </div>
            <div class="col-md-5">
              <label class="form-label fw-semibold">KDV Oranı</label>
              <select name="vat_rate" class="form-select">
                {% for r in vat_rates %}
                <option value="{{ r }}" {% if invoice and invoice.vat_rate == r %}selected{% elif not invoice and r == 0.20 %}selected{% endif %}>%{{ (r * 100) | int }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Tedarikçi</label>
              <select name="vendor_id" class="form-select">
                <option value="">— Seçiniz —</option>
                {% for v in vendors %}
                <option value="{{ v.id }}" {% if invoice and invoice.vendor_id == v.id %}selected{% endif %}>{{ v.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Referans</label>
              <select name="ref_id" class="form-select">
                <option value="">— Seçiniz —</option>
                {% for r in refs %}
                <option value="{{ r.id }}" {% if (invoice and invoice.ref_id == r.id) or preselected_ref_id == r.id %}selected{% endif %}>{{ r.ref_no }} — {{ r.title[:30] }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Notlar</label>
              <textarea name="notes" class="form-control" rows="2">{{ invoice.notes if invoice else '' }}</textarea>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">Kaydet</button>
            <a href="/invoices{% if invoice %}/{{ invoice.id }}{% endif %}" class="btn btn-outline-secondary">İptal</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
