{% extends "base.html" %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Ad <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required value="{{ vendor.name if vendor else '' }}">
          </div>
          <div class="row g-3">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Tip</label>
              <select name="vendor_type" class="form-select">
                {% for val, label in vendor_types %}
                <option value="{{ val }}" {% if vendor and vendor.vendor_type == val %}selected{% elif not vendor and val == 'genel' %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Vade (gün)</label>
              <input type="number" name="payment_term" class="form-control" min="0" value="{{ vendor.payment_term if vendor else '30' }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">IBAN</label>
            <input type="text" name="iban" class="form-control font-monospace" placeholder="TR00 0000 0000 0000 0000 0000 00" value="{{ vendor.iban if vendor else '' }}">
          </div>
          <div class="row g-3">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Vergi No</label>
              <input type="text" name="tax_no" class="form-control" value="{{ vendor.tax_no if vendor else '' }}">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Vergi Dairesi</label>
              <input type="text" name="tax_office" class="form-control" value="{{ vendor.tax_office if vendor else '' }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Adres</label>
            <textarea name="address" class="form-control" rows="2">{{ vendor.address if vendor else '' }}</textarea>
          </div>
          <div class="row g-3">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Telefon</label>
              <input type="text" name="phone" class="form-control" value="{{ vendor.phone if vendor else '' }}">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">E-posta</label>
              <input type="email" name="email" class="form-control" value="{{ vendor.email if vendor else '' }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">İletişim Kişisi</label>
            <input type="text" name="contact" class="form-control" placeholder="Yetkili adı, unvanı" value="{{ vendor.contact if vendor else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Notlar</label>
            <textarea name="notes" class="form-control" rows="2">{{ vendor.notes if vendor else '' }}</textarea>
          </div>
          {% if vendor %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Durum</label>
            <select name="active" class="form-select">
              <option value="1" {% if vendor.active %}selected{% endif %}>Aktif</option>
              <option value="0" {% if not vendor.active %}selected{% endif %}>Pasif</option>
            </select>
          </div>
          {% endif %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Kaydet</button>
            <a href="/vendors{% if vendor %}/{{ vendor.id }}{% endif %}" class="btn btn-outline-secondary">İptal</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
