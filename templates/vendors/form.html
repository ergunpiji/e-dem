{% extends "base.html" %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Ad</label>
            <input type="text" name="name" class="form-control" required value="{{ vendor.name if vendor else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Tip</label>
            <select name="vendor_type" class="form-select">
              {% for val, label in vendor_types %}
              <option value="{{ val }}" {% if vendor and vendor.vendor_type == val %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">IBAN</label>
            <input type="text" name="iban" class="form-control font-monospace" value="{{ vendor.iban if vendor else '' }}">
          </div>
          <div class="row g-3">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Vergi No</label>
              <input type="text" name="tax_no" class="form-control" value="{{ vendor.tax_no if vendor else '' }}">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Vergi Dairesi</label>
              <input type="text" name="tax_office" class="form-control" value="{{ vendor.tax_office if vendor else '' }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">İletişim</label>
            <input type="text" name="contact" class="form-control" value="{{ vendor.contact if vendor else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Notlar</label>
            <textarea name="notes" class="form-control" rows="2">{{ vendor.notes if vendor else '' }}</textarea>
          </div>
          {% if vendor %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Durum</label>
            <select name="active" class="form-select">
              <option value="1" {% if vendor.active %}selected{% endif %}>Aktif</option>
              <option value="0" {% if not vendor.active %}selected{% endif %}>Pasif</option>
            </select>
          </div>
          {% endif %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Kaydet</button>
            <a href="/vendors{% if vendor %}/{{ vendor.id }}{% endif %}" class="btn btn-outline-secondary">İptal</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
